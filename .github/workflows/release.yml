name: Release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mcp-kit/cli build
      # Configure npmjs.com trusted publishers for this repository and workflow
      # so GitHub OIDC can publish without a long-lived npm token.
      - run: pnpm exec mcp-kit release --publish
